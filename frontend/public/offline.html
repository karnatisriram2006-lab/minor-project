<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial=scale=1" />
    <meta name="theme-color" content="#8b5cf6" />
    <title>YĀTRĀ - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #1f2937;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        max-width: 480px;
        text-align: center;
        animation: slideUp 0.6s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: #f3e8ff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #1f2937;
      }

      .subtitle {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .features {
        background: #f9fafb;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 24px;
        text-align: left;
      }

      .features h3 {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 12px;
      }

      .feature-item {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
      }

      .feature-item::before {
        content: "✓";
        display: inline-block;
        width: 20px;
        color: #10b981;
        font-weight: bold;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-direction: column;
      }

      button {
        padding: 12px 24px;
        border-radius: 10px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f3f4f6;
        color: #374151;
      }

      .btn-secondary:hover {
        background: #e5e7eb;
      }

      .status {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 16px;
      }

      @media (max-width: 640px) {
        .card {
          padding: 32px 24px;
        }

        h1 {
          font-size: 24px;
        }

        .icon {
          width: 64px;
          height: 64px;
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p class="subtitle">
          Don't worry! YĀTRĀ has cached your data. You can still access previously visited pages and your saved trips.
        </p>

        <div class="features">
          <h3>Available offline:</h3>
          <div class="feature-item">Saved trips and itineraries</div>
          <div class="feature-item">Tourist places and destinations</div>
          <div class="feature-item">Trip history and details</div>
          <div class="feature-item">Your profile information</div>
        </div>

        <div class="actions">
          <button class="btn-primary" onclick="goBack()">Go Back</button>
          <button class="btn-secondary" onclick="goHome()">Go to Home</button>
        </div>

        <div class="status">
          <p>Waiting for connection to resume...</p>
        </div>
      </div>
    </div>

    <script>
      function goBack() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = '/';
        }
      }

      function goHome() {
        window.location.href = '/';
      }

      // Listen for online event
      window.addEventListener('online', () => {
        document.body.style.backgroundColor = '#10b981';
        const statusEl = document.querySelector('.status');
        if (statusEl) {
          statusEl.innerHTML = '<p style="color: white;">✓ You are back online!</p>';
        }
        
        // Reload page after 2 seconds
        setTimeout(() => {
          window.location.reload();
        }, 2000);
      });

      // Check connection periodically
      let retryCount = 0;
      setInterval(() => {
        fetch('/api/health', { method: 'HEAD' })
          .then(() => {
            window.dispatchEvent(new Event('online'));
          })
          .catch(() => {
            retryCount++;
          });
      }, 5000);
    </script>
  </body>
</html>
